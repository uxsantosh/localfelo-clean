<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Hash Tester</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      border-bottom: 2px solid #CDFF00;
      padding-bottom: 10px;
    }
    input, button {
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      font-size: 14px;
      font-family: monospace;
    }
    button {
      background: #CDFF00;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #b8e600;
    }
    .result {
      background: #f9f9f9;
      padding: 15px;
      border-left: 4px solid #CDFF00;
      margin: 10px 0;
      word-break: break-all;
    }
    .error {
      border-left-color: #ff0000;
      background: #fff5f5;
    }
    .success {
      border-left-color: #00ff00;
      background: #f0fff0;
    }
    .label {
      font-weight: bold;
      color: #666;
      margin-top: 15px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Password Hash Tester</h1>
    <p>Test if password hashing is working correctly</p>

    <span class="label">Enter Password:</span>
    <input type="text" id="password1" placeholder="Enter password" value="test123">
    
    <button onclick="testSingleHash()">🔐 Generate Hash</button>
    
    <div id="result1"></div>

    <hr style="margin: 30px 0;">

    <span class="label">Test Password Matching:</span>
    <input type="text" id="password2" placeholder="Password 1" value="test123">
    <input type="text" id="password3" placeholder="Password 2" value="test123">
    
    <button onclick="testMatching()">🔍 Compare Hashes</button>
    
    <div id="result2"></div>

    <hr style="margin: 30px 0;">

    <span class="label">Manual Hash Comparison:</span>
    <input type="text" id="password4" placeholder="Enter password">
    <input type="text" id="storedHash" placeholder="Paste stored hash from database">
    
    <button onclick="compareWithStored()">✅ Verify</button>
    
    <div id="result3"></div>
  </div>

  <script>
    // SHA-256 hash function (same as in passwordHash.ts)
    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    }

    async function testSingleHash() {
      const password = document.getElementById('password1').value;
      const resultDiv = document.getElementById('result1');
      
      try {
        const trimmed = password.trim();
        const hash = await hashPassword(trimmed);
        
        resultDiv.innerHTML = `
          <div class="result success">
            <strong>✅ Hash Generated Successfully</strong><br><br>
            <strong>Original:</strong> "${password}" (${password.length} chars)<br>
            <strong>Trimmed:</strong> "${trimmed}" (${trimmed.length} chars)<br>
            <strong>Hash:</strong> ${hash}<br>
            <strong>Length:</strong> ${hash.length} chars<br><br>
            ${password !== trimmed ? '<strong style="color: red;">⚠️ WARNING: Whitespace was trimmed!</strong>' : ''}
          </div>
        `;
      } catch (err) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error:</strong> ${err.message}
          </div>
        `;
      }
    }

    async function testMatching() {
      const password1 = document.getElementById('password2').value;
      const password2 = document.getElementById('password3').value;
      const resultDiv = document.getElementById('result2');
      
      try {
        const trimmed1 = password1.trim();
        const trimmed2 = password2.trim();
        
        const hash1 = await hashPassword(trimmed1);
        const hash2 = await hashPassword(trimmed2);
        
        const match = hash1 === hash2;
        
        resultDiv.innerHTML = `
          <div class="result ${match ? 'success' : 'error'}">
            <strong>${match ? '✅' : '❌'} Hashes ${match ? 'MATCH' : 'DO NOT MATCH'}</strong><br><br>
            <strong>Password 1:</strong> "${password1}" → "${trimmed1}"<br>
            <strong>Hash 1:</strong> ${hash1}<br><br>
            <strong>Password 2:</strong> "${password2}" → "${trimmed2}"<br>
            <strong>Hash 2:</strong> ${hash2}<br><br>
            ${!match ? '<strong style="color: red;">Passwords are different!</strong>' : ''}
            ${password1 !== trimmed1 || password2 !== trimmed2 ? '<br><strong style="color: orange;">⚠️ Whitespace was trimmed</strong>' : ''}
          </div>
        `;
      } catch (err) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error:</strong> ${err.message}
          </div>
        `;
      }
    }

    async function compareWithStored() {
      const password = document.getElementById('password4').value;
      const storedHash = document.getElementById('storedHash').value.trim();
      const resultDiv = document.getElementById('result3');
      
      if (!storedHash) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Please paste the stored hash from database</strong>
          </div>
        `;
        return;
      }
      
      try {
        const trimmed = password.trim();
        const generatedHash = await hashPassword(trimmed);
        const match = generatedHash === storedHash;
        
        resultDiv.innerHTML = `
          <div class="result ${match ? 'success' : 'error'}">
            <strong>${match ? '✅ VALID PASSWORD' : '❌ INVALID PASSWORD'}</strong><br><br>
            <strong>Entered Password:</strong> "${password}" → "${trimmed}"<br>
            <strong>Generated Hash:</strong> ${generatedHash}<br><br>
            <strong>Stored Hash:</strong> ${storedHash}<br><br>
            <strong>Match:</strong> ${match ? 'YES ✅' : 'NO ❌'}<br>
            <strong>Length Match:</strong> ${generatedHash.length} vs ${storedHash.length} ${generatedHash.length === storedHash.length ? '✅' : '❌'}<br><br>
            ${!match && generatedHash.length === storedHash.length ? '<strong style="color: red;">Hash lengths match but content differs - passwords are different!</strong>' : ''}
            ${!match && generatedHash.length !== storedHash.length ? '<strong style="color: red;">Hash lengths differ - possible corruption or wrong algorithm!</strong>' : ''}
          </div>
        `;
      } catch (err) {
        resultDiv.innerHTML = `
          <div class="result error">
            <strong>❌ Error:</strong> ${err.message}
          </div>
        `;
      }
    }
  </script>
</body>
</html>
