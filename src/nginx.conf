# Nginx configuration for LocalFelo SPA
# Place this in /etc/nginx/sites-available/localfelo
# Then symlink to sites-enabled: ln -s /etc/nginx/sites-available/localfelo /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name www.localfelo.com localfelo.com;

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;
}

server {
    # Uncomment these lines after SSL setup
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    listen 80;
    listen [::]:80;
    
    server_name www.localfelo.com localfelo.com;

    # SSL Configuration (uncomment after getting SSL certificate)
    # ssl_certificate /etc/letsencrypt/live/www.localfelo.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.localfelo.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # Document root - adjust this path to your actual build directory
    root /var/www/localfelo/dist;
    index index.html;

    # Logging
    access_log /var/log/nginx/localfelo_access.log;
    error_log /var/log/nginx/localfelo_error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache control for static assets (JS, CSS, images with hashes)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Cache control for images
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Never cache HTML files
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    # Never cache version.json (critical for update detection)
    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Special handling for service worker
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # SPA routing - serve index.html for all routes
    # This is the KEY configuration for React Router to work
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Optional: Deny access to sensitive files
    location ~* (\.env|\.git|\.htaccess|\.htpasswd|\.sql|\.tar|\.zip|\.tgz|\.gz|composer\.json|composer\.lock|package\.json|package-lock\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
