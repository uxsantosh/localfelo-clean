    <script>
      (function() {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(value) {
              currentFetch = value;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var currentFetch = window.fetch;
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(value) {
                currentFetch = value;
              },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            console.warn('Sandbox fetch setter adaptation skipped:', err);
          }
        }
      })();
    </script>
